<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training Log">
<meta name="theme-color" content="#10151a">
<title>Training Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@500;600;700&family=Barlow:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e1318; --bg2:#141b22; --card:#1a232c; --line:#2a3742;
    --ink:#eef3f6; --mut:#8597a3; --teal:#2fb8b0; --teal-d:#1f7e79;
    --orange:#e08a2b; --orange-d:#b06a18; --danger:#e0635b;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --disp:'Barlow Semi Condensed',system-ui,sans-serif;
    --body:'Barlow',system-ui,-apple-system,sans-serif;
    --accent:var(--teal); --accent-d:var(--teal-d);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);
    font-size:16px;line-height:1.35;-webkit-text-size-adjust:100%}
  body{padding-bottom:calc(78px + env(safe-area-inset-bottom))}
  h1,h2,h3{font-family:var(--disp);margin:0;letter-spacing:.3px}
  .mono{font-family:var(--mono)}
  .wrap{max-width:560px;margin:0 auto;padding:0 14px}
  /* header */
  header{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--bg2),var(--bg));
    border-bottom:1px solid var(--line);padding:calc(10px + env(safe-area-inset-top)) 0 10px}
  .hrow{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .logo{font-family:var(--disp);font-weight:700;font-size:22px;text-transform:uppercase;letter-spacing:1.5px}
  .logo b{color:var(--accent)}
  .date{font-family:var(--mono);font-size:12px;color:var(--mut);background:var(--card);
    border:1px solid var(--line);border-radius:8px;padding:6px 9px}
  .date input{background:transparent;border:0;color:var(--ink);font-family:var(--mono);font-size:12px;width:108px}
  /* segmented */
  .seg{display:flex;gap:6px;margin:12px 0 4px;background:var(--bg2);border:1px solid var(--line);
    border-radius:12px;padding:5px}
  .seg button{flex:1;border:0;background:transparent;color:var(--mut);font-family:var(--disp);
    font-weight:600;font-size:14px;text-transform:uppercase;letter-spacing:.6px;padding:9px 4px;border-radius:8px}
  .seg button.on{background:var(--accent);color:#06231f}
  /* cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:13px 13px 11px;margin:11px 0;
    position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent);opacity:.8}
  .card.skip{opacity:.5}
  .cardtop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
  .exname{font-family:var(--disp);font-weight:700;font-size:18px;letter-spacing:.3px}
  .target{color:var(--ink);font-size:13px;margin-top:2px}
  .last{color:var(--mut);font-size:12px;font-style:italic;margin-top:1px;font-family:var(--mono)}
  .swap{color:var(--accent);font-size:13px;font-weight:600;white-space:nowrap;cursor:pointer;border:0;background:none;padding:2px 0}
  .badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--orange);
    border:1px solid var(--orange-d);background:rgba(224,138,43,.12);border-radius:7px;padding:3px 7px}
  /* fields */
  .fields{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px}
  .field{flex:1;min-width:62px}
  .field input{width:100%;background:var(--bg2);border:1px solid var(--line);border-radius:9px;
    color:var(--ink);font-family:var(--mono);font-weight:700;font-size:17px;text-align:center;padding:9px 4px}
  .field input:focus{outline:none;border-color:var(--accent)}
  .field label{display:block;text-align:center;color:var(--mut);font-size:10px;text-transform:uppercase;
    letter-spacing:.5px;margin-top:3px}
  .rir{display:flex;align-items:center;gap:7px;margin-top:10px;flex-wrap:wrap}
  .rir .rl{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--mut)}
  .rir button{border:1px solid var(--line);background:var(--bg2);color:var(--mut);font-family:var(--mono);
    font-weight:700;border-radius:7px;width:34px;height:30px}
  .rir button.on{background:var(--accent);color:#06231f;border-color:var(--accent)}
  .row2{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap}
  .link{color:var(--accent);font-size:12px;font-weight:600;background:none;border:0;padding:3px 0;cursor:pointer}
  .link.mut{color:var(--mut)}
  .reveal{margin-top:9px;background:var(--bg2);border:1px solid var(--line);border-radius:9px;padding:9px 10px;font-size:13px}
  .reveal ul{margin:0;padding-left:16px} .reveal li{margin:2px 0;color:#cdd8de}
  .noteinput{width:100%;margin-top:9px;background:var(--bg2);border:1px solid var(--line);border-radius:9px;
    color:var(--ink);font-family:var(--body);font-size:14px;padding:9px 10px;resize:vertical;min-height:40px}
  .savednote{margin-top:8px;color:var(--orange);font-size:12.5px;font-style:italic}
  .infobtn{flex:0 0 auto;width:26px;height:26px;border-radius:50%;border:1.5px solid var(--accent-d);
    background:transparent;color:var(--accent);font-size:14px;font-weight:700;line-height:1;cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center}
  .namewrap{display:flex;align-items:center;gap:8px}
  .notebtn.note-on{background:var(--accent);color:#06231f;border-color:var(--accent)}
  .notepill{display:inline-flex;align-items:center;gap:5px;border:1.5px solid #8a6a3a;
    background:rgba(224,138,43,.10);color:var(--orange);font-family:var(--disp);font-weight:700;
    font-size:12px;text-transform:uppercase;letter-spacing:.6px;padding:7px 12px;border-radius:8px;
    cursor:pointer;white-space:nowrap;margin-left:4px}
  .notepill.note-on{background:var(--orange);color:#1a1208;border-color:var(--orange)}
  .acts{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:13px}
  .acts button{border:1.5px solid var(--line);background:var(--bg2);color:var(--mut);
    font-family:var(--disp);font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:.5px;
    padding:11px 20px;border-radius:10px;cursor:pointer}
  .btn-skip{color:var(--mut)}
  .btn-skip.skip-on{background:#3a2a2a;border-color:#7a4a4a;color:#f0c9c9}
  .btn-done{color:#4fd084;border-color:#2a6b43}
  .btn-done.done-on{background:#2a9c54;border-color:#37b566;color:#06231f}
  .card.done::before{background:#2a9c54;opacity:1}
  .card.done{border-color:#2a6b43}
  .donecheck{position:absolute;top:11px;right:12px;color:#3fd07a;font-size:20px;font-weight:700;display:none}
  .card.done .donecheck{display:block}
  .card.done .swap{display:none}
  /* buttons */
  .btn{display:block;width:100%;border:0;border-radius:12px;font-family:var(--disp);font-weight:700;
    font-size:16px;letter-spacing:.5px;text-transform:uppercase;padding:14px;margin-top:10px;cursor:pointer}
  .btn.primary{background:var(--accent);color:#06231f}
  .btn.dark{background:#0a0f13;color:var(--ink);border:1px solid var(--line)}
  .btn.ghost{background:transparent;color:var(--accent);border:1.5px solid var(--accent-d)}
  .btn.sm{font-size:13px;padding:11px}
  .twocol{display:flex;gap:9px} .twocol .btn{margin-top:10px}
  /* forms */
  .formlbl{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--mut);margin:14px 0 5px}
  select,.txt,.area{width:100%;background:var(--card);border:1px solid var(--line);border-radius:10px;
    color:var(--ink);font-family:var(--body);font-size:15px;padding:11px}
  select:focus,.txt:focus,.area:focus{outline:none;border-color:var(--accent)}
  .area{min-height:96px;resize:vertical}
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .chips button{border:1px solid var(--line);background:var(--card);color:var(--mut);border-radius:9px;
    padding:9px 13px;font-family:var(--disp);font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:.4px}
  .chips button.on{background:var(--accent);color:#06231f;border-color:var(--accent)}
  .hint{color:var(--mut);font-size:12.5px;margin-top:7px;font-style:italic}
  /* history */
  .hsess{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin:9px 0}
  .hsess h3{font-size:15px;display:flex;justify-content:space-between;align-items:center}
  .htag{font-family:var(--mono);font-size:11px;color:var(--mut)}
  .hsess .det{margin-top:7px;font-size:13px;color:#c2cdd3;display:none}
  .hsess .det.show{display:block}
  .hsess .det div{padding:3px 0;border-top:1px solid var(--line)}
  .hsess .det div:first-child{border-top:0}
  .empty{color:var(--mut);text-align:center;padding:30px 10px;font-style:italic}
  .sectit{font-family:var(--disp);font-weight:700;text-transform:uppercase;letter-spacing:1px;
    font-size:13px;color:var(--mut);margin:22px 0 4px}
  /* bottom nav */
  nav{position:fixed;left:0;right:0;bottom:0;z-index:30;background:var(--bg2);border-top:1px solid var(--line);
    display:flex;padding:8px 6px calc(8px + env(safe-area-inset-bottom));gap:4px}
  nav button{flex:1;background:none;border:0;color:var(--mut);font-family:var(--disp);font-weight:600;
    font-size:11px;text-transform:uppercase;letter-spacing:.5px;padding:5px 2px;border-radius:9px}
  nav button .ic{display:block;font-size:19px;line-height:1;margin-bottom:3px;font-family:var(--body)}
  nav button.on{color:var(--accent)}
  /* modal */
  .scrim{position:fixed;inset:0;background:rgba(4,8,11,.72);z-index:50;display:none;
    align-items:flex-end;justify-content:center;padding:0}
  .scrim.show{display:flex}
  .sheet{width:100%;max-width:560px;background:var(--bg2);border:1px solid var(--line);
    border-radius:18px 18px 0 0;padding:16px 14px calc(16px + env(safe-area-inset-bottom));max-height:86vh;overflow:auto}
  .sheet h2{font-size:19px;text-transform:uppercase;letter-spacing:.5px}
  .sheet .sub{color:var(--mut);font-size:13px;margin:3px 0 12px}
  .opt{width:100%;text-align:left;background:var(--card);border:1px solid var(--line);border-radius:11px;
    padding:12px;margin:8px 0;color:var(--ink)}
  .opt.on{border-color:var(--accent);background:rgba(47,184,176,.08)}
  .opt b{font-family:var(--disp);font-size:15.5px}
  .opt span{display:block;color:var(--mut);font-size:12px;margin-top:2px;font-family:var(--mono)}
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:#05201d;color:#bdeee9;
    border:1px solid var(--teal-d);padding:10px 16px;border-radius:10px;font-size:13.5px;z-index:60;
    opacity:0;transition:opacity .2s;pointer-events:none;font-weight:600}
  .toast.show{opacity:1}
</style>
</head>
<body>
<header>
  <div class="wrap hrow">
    <div class="logo">TRAIN<b>·</b>LOG</div>
    <div class="date">📅 <input type="date" id="sessDate"></div>
  </div>
</header>

<main class="wrap" id="main"></main>

<nav class="wrap" style="max-width:560px">
  <button data-view="A" class="on"><span class="ic">▣</span>Workout</button>
  <button data-view="extra"><span class="ic">+</span>Extra</button>
  <button data-view="history"><span class="ic">≣</span>History</button>
</nav>

<div class="scrim" id="scrim"><div class="sheet" id="sheet"></div></div>
<div class="toast" id="toast"></div>

<script>
"use strict";
/* ---------------- storage ---------------- */
var LS="tl_data_v1", DK="tl_draft_v1";
function fresh(){return{version:1,bodyweight:"",sessions:[],exportedUpto:null};}
function load(){try{return Object.assign(fresh(),JSON.parse(localStorage.getItem(LS))||{});}catch(e){return fresh();}}
function persist(){try{localStorage.setItem(LS,JSON.stringify(DATA));}catch(e){}}
function saveDraft(){try{localStorage.setItem(DK,JSON.stringify(draft));}catch(e){}}
function loadDraft(){try{return JSON.parse(localStorage.getItem(DK));}catch(e){return null;}}
function clearDraft(){try{localStorage.removeItem(DK);}catch(e){}}
var DATA=load();

/* ---------------- templates ---------------- */
var TPL={
 A:{name:"Template A",sub:"Lower-strength lead",ex:[
  {key:"wu",name:"Warm-up",target:"Free-text — log what you did",freetext:true,cue:["Light backward sled drag 2–3 lengths","Tib raises · ankle + hip mobility","A few easy bodyweight split squats"],fields:[]},
  {key:"tbdl",name:"Trap-bar deadlift",target:"Target  4 × 5 @ 85 kg",rir:true,
   cue:["Neutral spine, brace, full lockout","Controlled lowering — no drop/bounce","Add 2.5–5 kg when all sets feel crisp"],
   fields:[{k:"sets",l:"sets",ph:"4"},{k:"reps",l:"reps",ph:"5"},{k:"kg",l:"kg",ph:"85"}],
   swaps:["Conventional deadlift","DB Romanian deadlift","Hip thrust"]},
  {key:"ssq",name:"Split squat — FFE (weighted)",target:"Target  3 × 8–10 / leg · added load",
   cue:["Front foot elevated 2–4 in","Front heel planted, knee over toes","Prioritise the RIGHT ankle — depth + balance","Load you can control for clean reps (goblet → DBs)"],
   fields:[{k:"sets",l:"sets",ph:"3"},{k:"reps",l:"reps/leg",ph:"9"},{k:"kg",l:"load kg",ph:"goblet"}],
   swaps:["Reverse lunge","Step-up","Walking lunge"]},
  {key:"pull",name:"Pull-up block",target:"Negatives 4–5×1 (5–8s) · blue band 3×5–6",
   cue:["Negatives: 5–8 s lower, full rest","Reduce band tension as you strengthen","Re-test strict singles every 2 weeks"],
   fields:[{k:"neg",l:"neg reps",ph:"5"},{k:"band",l:"band reps",ph:"6"},{k:"hold",l:"top hold s",ph:"—"}],
   swaps:["Lat pulldown","Ring rows","Band-assisted only"]},
  {key:"bext",name:"Back extension",target:"Target  3 × 12–15",
   cue:["Segmental: round down, re-extend through the spine","Feel the LOWER BACK, not the hamstrings","Add a light plate once the pattern holds"],
   fields:[{k:"sets",l:"sets",ph:"3"},{k:"reps",l:"reps",ph:"13"},{k:"kg",l:"load",ph:"BW"}],
   swaps:["Reverse hyper","Light good morning"]},
  {key:"calf",name:"Calf — slow, full ROM",target:"Bent-knee 3×10–12 + straight 2×10–12",
   cue:["3 s up / 3 s down, full stretch at the bottom","Bent-knee first (soleus), then straight","+1 set on the right · full range OK (midportion)"],
   fields:[{k:"bent",l:"bent ×reps",ph:"3×12"},{k:"str",l:"straight ×reps",ph:"2×12"},{k:"kg",l:"load",ph:"BW"}],
   swaps:["Seated calf raise","Leg-press calf"]},
  {key:"trunk",name:"Trunk",target:"Plank 3×~50s + Pallof 3×10/side",
   cue:["Plank: neutral line, no sag — build toward 2:00","Pallof: resist the rotation, ribs down"],
   fields:[{k:"plank",l:"plank s",ph:"50"},{k:"pallof",l:"pallof/side",ph:"10"}],swaps:[]}
 ]},
 B:{name:"Template B",sub:"Upper + carry lead",ex:[
  {key:"wu",name:"Warm-up",target:"Free-text — log what you did",freetext:true,cue:["Light backward sled drag","Band pull-aparts · push-up ramp","Scapular pull-ups 2 × 5"],fields:[]},
  {key:"bench",name:"DB bench press",target:"Target  4 × 6–8 @ 16 kg",rir:true,
   cue:["Flat bench, handles parallel, no twist","Full stretch at the bottom, full lockout","LEFT arm sets the number — match both to it"],
   fields:[{k:"sets",l:"sets",ph:"4"},{k:"reps",l:"reps",ph:"7"},{k:"kg",l:"kg/hand",ph:"16"}],
   swaps:["DB floor press","Machine chest press","Weighted push-up","Dip"]},
  {key:"row",name:"Barbell row",target:"Target  4 × 8–12 @ 30 kg",
   cue:["Torso angle frozen — don't let it rise","Elbows lead, pull to the lower ribs","Full stretch at the bottom"],
   fields:[{k:"sets",l:"sets",ph:"4"},{k:"reps",l:"reps",ph:"10"},{k:"kg",l:"kg",ph:"30"}],
   swaps:["DB row","Chest-supported row","Cable row","Inverted row"]},
  {key:"pull",name:"Pull-up block",target:"Negatives 4–5×1 + top hold 30–60s",
   cue:["Negatives: 5–8 s lower","Accumulate 30–60 s of top holds","Re-test strict singles every 2 weeks"],
   fields:[{k:"neg",l:"neg reps",ph:"5"},{k:"band",l:"band reps",ph:"—"},{k:"hold",l:"top hold s",ph:"40"}],
   swaps:["Lat pulldown","Ring rows","Band-assisted only"]},
  {key:"push",name:"Push-up",target:"Target  3 × 12–15",
   cue:["Full depth, full lockout","Rigid line — no sagging hips"],
   fields:[{k:"sets",l:"sets",ph:"3"},{k:"reps",l:"reps",ph:"13"}],swaps:["Incline push-up","Deficit push-up"]},
  {key:"nordic",name:"Nordic / ham eccentric",target:"Target  3 × 3–5",
   cue:["Lower as slowly as you can control","Top third only for now (or banded)","Push off the floor to reset"],
   fields:[{k:"sets",l:"sets",ph:"3"},{k:"reps",l:"reps",ph:"4"},{k:"range",l:"range",ph:"⅓"}],
   swaps:["Sliding leg curl","Machine leg curl"]},
  {key:"carry",name:"Carries",target:"Farmer 4×60m @24 + suitcase 2×30m/side",
   cue:["Tall, braced, shoulders back","Suitcase: LEFT emphasis (grip + anti-lateral-flexion)"],
   fields:[{k:"farmer",l:"farmer m",ph:"60"},{k:"fkg",l:"kg/hand",ph:"24"},{k:"suit",l:"suitcase m/side",ph:"30"}],swaps:[]},
  {key:"trunkb",name:"Trunk",target:"Hanging knee raise 3×8–12 + hollow 3×30–45s",
   cue:["Control the lower-back position","Hollow: ribs down, low back to the floor"],
   fields:[{k:"hang",l:"knee raise",ph:"10"},{k:"hollow",l:"hollow s",ph:"40"}],swaps:[]}
 ]}
};

/* ---------------- helpers ---------------- */
function $(id){return document.getElementById(id);}
function todayISO(){var d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,10);}
function fmtDate(iso){try{var d=new Date(iso+"T00:00");return d.toLocaleDateString(undefined,{weekday:"short",day:"numeric",month:"short"});}catch(e){return iso;}}
function esc(s){return(s==null?"":String(s)).replace(/[&<>]/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;"}[c];});}
function toast(m){var t=$("toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("show");},1700);}

function lastItem(name){
  for(var i=DATA.sessions.length-1;i>=0;i--){
    var s=DATA.sessions[i]; if(s.type!=="A"&&s.type!=="B")continue;
    for(var j=0;j<s.items.length;j++){var it=s.items[j];
      if(it.name===name&&!it.skipped&&hasVals(it))return it;}
  } return null;
}
function hasVals(it){if(!it.values)return false;for(var k in it.values){if(it.values[k]!=="")return true;}return false;}
function lastStr(it){
  if(!it)return "Last  —";
  var parts=[];for(var k in it.values){if(it.values[k]!=="")parts.push(it.values[k]);}
  var s="Last  "+(parts.join(" · ")||"—"); if(it.rir!=null&&it.rir!=="")s+=" · RIR "+it.rir; return s;
}

/* ---------------- draft ---------------- */
var draft=loadDraft();
function newDraft(type){
  var t=TPL[type];
  return {type:type,date:$("sessDate")?$("sessDate").value:todayISO(),
   items:t.ex.map(function(ex){
     var li=lastItem(ex.name),vals={};
     ex.fields.forEach(function(f){vals[f.k]= li&&li.values&&li.values[f.k]!=null? li.values[f.k] : "";});
     return {key:ex.key,name:ex.name,base:ex.name,swapped:false,skipped:false,done:false,values:vals,
       rir: ex.rir? (li&&li.rir!=null?li.rir:"") : null, note:""};
   })};
}
if(!draft||(draft.type!=="A"&&draft.type!=="B"))draft=newDraft("A");

/* ---------------- views ---------------- */
var view="A";
function setAccent(type){
  var r=document.documentElement.style;
  if(type==="B"){r.setProperty("--accent","var(--orange)");r.setProperty("--accent-d","var(--orange-d)");}
  else{r.setProperty("--accent","var(--teal)");r.setProperty("--accent-d","var(--teal-d)");}
}
function render(){
  var m=$("main");
  if(view==="A"||view==="B"){setAccent(draft.type);m.innerHTML=workoutHTML();bindWorkout();}
  else if(view==="extra"){setAccent("A");m.innerHTML=extraHTML();bindExtra();}
  else {setAccent("A");m.innerHTML=historyHTML();bindHistory();}
}

/* workout */
function workoutHTML(){
  var h='<div class="seg">'
    +'<button data-t="A" class="'+(draft.type==="A"?"on":"")+'">Template A</button>'
    +'<button data-t="B" class="'+(draft.type==="B"?"on":"")+'">Template B</button></div>';
  var t=TPL[draft.type];
  t.ex.forEach(function(ex,i){
    var it=draft.items[i], li=lastItem(it.name);
    h+='<div class="card '+(it.skipped?"skip":"")+(it.done?" done":"")+'" data-i="'+i+'">';
    h+='<div class="donecheck">✓</div>';
    h+='<div class="cardtop"><div style="flex:1"><div class="namewrap"><span class="exname">'+esc(it.name)+'</span>';
    h+='<button class="infobtn" data-act="cue" data-i="'+i+'" aria-label="cues">ⓘ</button>';
    if(!ex.freetext)h+='<button class="notepill '+(it.note?"note-on":"")+'" data-act="note" data-i="'+i+'">✎ note</button>';
    h+='</div>';
    if(it.swapped)h+='<div class="target" style="color:var(--orange)">↳ swapped from '+esc(it.base)+'</div>';
    else h+='<div class="target">'+esc(ex.target)+'</div>';
    if(!ex.freetext)h+='<div class="last">'+esc(lastStr(li))+'</div>';
    h+='</div>';
    if((ex.swaps&&ex.swaps.length)||it.swapped)h+='<button class="swap" data-act="swap" data-i="'+i+'">⇄ swap</button>';
    h+='</div>';
    h+='<div class="reveal" id="cue'+i+'" style="display:none"><ul>'+ex.cue.map(function(c){return "<li>"+esc(c)+"</li>";}).join("")+'</ul></div>';
    h+='<div id="notew'+i+'" style="display:'+(it.note?"block":"none")+'">'
      +'<textarea class="noteinput" data-act="noteinput" data-i="'+i+'" placeholder="e.g. left arm capped at 6 · right ankle tight">'+esc(it.note)+'</textarea></div>';
    if(ex.freetext){
      h+='<textarea class="noteinput" data-act="ft" data-i="'+i+'" style="min-height:64px" placeholder="what you did — sled, mobility, ramp-up sets…">'+esc(it.values.text||"")+'</textarea>';
    } else if(ex.fields.length){
      h+='<div class="fields">';
      ex.fields.forEach(function(f){
        h+='<div class="field"><input inputmode="text" data-i="'+i+'" data-k="'+f.k+'" value="'+esc(it.values[f.k])+'" placeholder="'+esc(f.ph)+'"><label>'+esc(f.l)+'</label></div>';
      });
      h+='</div>';
    }
    if(ex.rir){
      h+='<div class="rir"><span class="rl">Top-set RIR</span>';
      ["0","1","2","3","4+"].forEach(function(v){h+='<button data-act="rir" data-i="'+i+'" data-v="'+v+'" class="'+(it.rir===v?"on":"")+'">'+v+'</button>';});
      h+='</div>';
    }
    h+='<div class="acts">';
    h+='<button class="btn-skip '+(it.skipped?"skip-on":"")+'" data-act="skip" data-i="'+i+'">'+(it.skipped?"skipped":"skip")+'</button>';
    h+='<button class="btn-done '+(it.done?"done-on":"")+'" data-act="done" data-i="'+i+'">'+(it.done?"✓ done":"mark done")+'</button>';
    h+='</div>';
    h+='</div>';
  });
  h+='<button class="btn primary" data-act="save">Save session</button>';
  h+='<button class="btn ghost sm" data-act="resetday">Clear this session</button>';
  return h;
}
function bindWorkout(){
  var m=$("main");
  m.querySelectorAll(".seg button").forEach(function(b){b.onclick=function(){
    var t=b.getAttribute("data-t"); if(t===draft.type)return;
    var dirty=draft.items.some(function(it){return hasVals(it)||it.note||it.skipped||it.done||(it.rir!=null&&it.rir!=="");});
    if(dirty&&!confirm("Start "+t+"? Unsaved entries in the current session will be cleared."))return;
    draft=newDraft(t);saveDraft();render();
  };});
  m.querySelectorAll('input[data-k]').forEach(function(inp){inp.oninput=function(){
    draft.items[+inp.getAttribute("data-i")].values[inp.getAttribute("data-k")]=inp.value;saveDraft();
  };});
  m.querySelectorAll('[data-act]').forEach(function(el){
    var act=el.getAttribute("data-act"),i=+el.getAttribute("data-i");
    if(act==="rir")el.onclick=function(){var it=draft.items[i];it.rir=(it.rir===el.getAttribute("data-v"))?"":el.getAttribute("data-v");saveDraft();render();};
    if(act==="cue")el.onclick=function(){var c=$("cue"+i);c.style.display=c.style.display==="none"?"block":"none";};
    if(act==="note")el.onclick=function(){var w=$("notew"+i);w.style.display=w.style.display==="none"?"block":"none";if(w.style.display==="block")w.querySelector("textarea").focus();};
    if(act==="noteinput")el.oninput=function(){draft.items[i].note=el.value;saveDraft();};
    if(act==="ft")el.oninput=function(){draft.items[i].values.text=el.value;saveDraft();};
    if(act==="done")el.onclick=function(){var it=draft.items[i];it.done=!it.done;if(it.done)it.skipped=false;saveDraft();render();};
    if(act==="skip")el.onclick=function(){var it=draft.items[i];it.skipped=!it.skipped;if(it.skipped)it.done=false;saveDraft();render();};
    if(act==="swap")el.onclick=function(){openSwap(i);};
    if(act==="save")el.onclick=saveSession;
    if(act==="resetday")el.onclick=function(){if(confirm("Clear this session's entries?")){draft=newDraft(draft.type);saveDraft();render();}};
  });
}
function saveSession(){
  draft.date=$("sessDate").value||todayISO();
  var rec=JSON.parse(JSON.stringify(draft)); rec.id=Date.now();
  DATA.sessions.push(rec); persist(); clearDraft();
  draft=newDraft(draft.type); saveDraft(); render();
  toast("Session saved ✓");
}

/* swap sheet */
function openSwap(i){
  var ex=TPL[draft.type].ex[i], it=draft.items[i];
  var sub="Pick a same-pattern sub — your "+esc(it.base)+" history stays separate.";
  var h='<h2>Swap exercise</h2><div class="sub">'+sub+'</div>';
  if(it.swapped)h+='<button class="opt" data-swapname="__revert"><b>↩ Back to '+esc(it.base)+'</b><span>restore the original</span></button>';
  (ex.swaps||[]).forEach(function(s){
    var li=lastItem(s);
    h+='<button class="opt'+(it.name===s?" on":"")+'" data-swapname="'+esc(s)+'"><b>'+esc(s)+'</b><span>'+(li?esc(lastStr(li)):"no history yet — first time")+'</span></button>';
  });
  h+='<button class="opt" data-swapname="__custom"><b>+ Type my own</b><span>logged as a variation</span></button>';
  h+='<button class="btn dark sm" data-close="1">Cancel</button>';
  openSheet(h);
  $("sheet").querySelectorAll("[data-swapname]").forEach(function(b){b.onclick=function(){
    var name=b.getAttribute("data-swapname");
    if(name==="__revert"){applySwap(i,it.base,false);}
    else if(name==="__custom"){var c=prompt("Exercise name:");if(c&&c.trim())applySwap(i,c.trim(),true);else return;}
    else{applySwap(i,name,true);}
    closeSheet();
  };});
  $("sheet").querySelector("[data-close]").onclick=closeSheet;
}
function applySwap(i,name,swapped){
  var ex=TPL[draft.type].ex[i], it=draft.items[i];
  it.name=name; it.swapped=swapped;
  var li=lastItem(name),vals={};
  ex.fields.forEach(function(f){vals[f.k]= li&&li.values&&li.values[f.k]!=null? li.values[f.k] : "";});
  it.values=vals; it.note="";
  saveDraft(); render();
}

/* extra (merged easy + other) */
var CAT_PH={
  Walk:"duration · pace · terrain · how it felt",
  Ruck:"duration · load · terrain · how it felt",
  Bike:"duration · pace/HR · how it felt",
  Stair:"duration · level · how it felt",
  Swim:"duration · distance · how it felt",
  Kettlebells:"e.g. 5 rounds: 10 swings @24 · 8 goblet squats @24 — felt strong",
  Conditioning:"format/rounds · movements · how it felt",
  "Improvised lift":"movements · sets × reps × load (e.g. 3×10 DB press @20)",
  Other:"what you did — include numbers/durations where you can"};
var CATS=Object.keys(CAT_PH);
function extraHTML(){
  return '<h2 style="margin:14px 0 2px;text-transform:uppercase;letter-spacing:.5px">Extra session</h2>'
   +'<div class="hint" style="margin-bottom:6px">Everything outside A/B — easy aerobic, rucks, kettlebells, hotel gyms, one-offs. Easy aerobic is your deep-endurance engine; keep it truly easy (could hold 60+ min). The more numbers you include, the more I can pull from it.</div>'
   +'<div class="formlbl">Category</div><div class="chips" id="exCat">'
   +CATS.map(function(x){return '<button data-v="'+esc(x)+'">'+esc(x)+'</button>';}).join("")+'</div>'
   +'<div class="formlbl">Duration (min) — optional</div><input class="txt" id="exDur" inputmode="numeric" placeholder="40">'
   +'<div class="formlbl">How it felt — optional</div><div class="chips" id="exFeel">'
   +['Easy','Moderate','Hard'].map(function(x){return '<button data-v="'+x+'">'+x+'</button>';}).join("")+'</div>'
   +'<div class="formlbl">Details</div><textarea class="area" id="exText" placeholder="'+esc(CAT_PH.Other)+'"></textarea>'
   +'<button class="btn primary" id="exSave">Save extra session</button>';
}
function bindExtra(){
  var cat="",fe="";
  $("exCat").querySelectorAll("button").forEach(function(b){b.onclick=function(){
    cat=b.getAttribute("data-v");$("exCat").querySelectorAll("button").forEach(function(x){x.classList.remove("on");});b.classList.add("on");
    $("exText").placeholder=CAT_PH[cat]||CAT_PH.Other;};});
  $("exFeel").querySelectorAll("button").forEach(function(b){b.onclick=function(){
    fe=b.getAttribute("data-v");$("exFeel").querySelectorAll("button").forEach(function(x){x.classList.remove("on");});b.classList.add("on");};});
  $("exSave").onclick=function(){
    if(!cat&&!$("exDur").value&&!$("exText").value.trim()){toast("Pick a category or add some detail");return;}
    DATA.sessions.push({id:Date.now(),type:"extra",date:$("sessDate").value||todayISO(),
      category:cat||"Other",duration:$("exDur").value,feel:fe,text:$("exText").value.trim()});
    persist();toast("Saved ✓");view="history";syncNav();render();
  };
}

/* history + export */
function historyHTML(){
  var h='<div class="sectit">Bodyweight</div>'
   +'<input class="txt" id="bw" inputmode="decimal" placeholder="e.g. 90 kg" value="'+esc(DATA.bodyweight)+'">';
  h+='<div class="sectit">Send to Claude</div>'
   +'<div class="twocol"><button class="btn primary sm" data-act="copyall">Copy all</button>'
   +'<button class="btn ghost sm" data-act="copynew">Copy since last</button></div>';
  h+='<div class="sectit">Backup (your safety net)</div>'
   +'<div class="twocol"><button class="btn dark sm" data-act="backup">Copy backup</button>'
   +'<button class="btn dark sm" data-act="restore">Restore…</button></div>';
  h+='<textarea class="area" id="iobox" style="margin-top:10px;font-family:var(--mono);font-size:12px" placeholder="Export text / backup appears here. To restore: paste a backup, then tap Restore."></textarea>';
  h+='<div class="sectit">History ('+DATA.sessions.length+')</div>';
  if(!DATA.sessions.length)h+='<div class="empty">No sessions yet. Log your first one from the Workout tab.</div>';
  else{
    DATA.sessions.slice().reverse().forEach(function(s){
      var title = s.type==="A"?"Template A":s.type==="B"?"Template B":s.type==="extra"?(esc(s.category)+(s.duration?" · "+esc(s.duration)+" min":"")):s.type==="aerobic"?(esc(s.modality)+" "+(s.duration?esc(s.duration)+" min":"")):("Other · "+esc(s.tag));
      h+='<div class="hsess" data-id="'+s.id+'"><h3>'+title+'<span class="htag">'+esc(fmtDate(s.date))+'</span></h3>';
      h+='<div class="det">'+sessionDetail(s)+'</div></div>';
    });
  }
  return h;
}
function sessionDetail(s){
  if(s.type==="A"||s.type==="B"){
    return s.items.map(function(it){
      if(it.key==="wu"&&!it.values.text&&!it.note&&!it.skipped)return "";
      if(it.skipped)return '<div>'+esc(it.name)+' — <i>skipped</i></div>';
      var parts=[];for(var k in it.values){if(it.values[k]!=="")parts.push(it.values[k]);}
      var line=esc(it.name)+(it.swapped?' (←'+esc(it.base)+')':'')+': '+(parts.join(" · ")||"—");
      if(it.rir!=null&&it.rir!=="")line+=" · RIR "+esc(it.rir);
      if(it.note)line+=' — '+esc(it.note);
      return '<div>'+line+'</div>';
    }).join("");
  }
  if(s.type==="extra"){var parts=[esc(s.category)];if(s.duration)parts.push(esc(s.duration)+" min");if(s.feel)parts.push(esc(s.feel));return '<div>'+parts.join(" · ")+(s.text?' — '+esc(s.text):'')+'</div>';}
  if(s.type==="aerobic")return '<div>'+esc(s.modality)+' · '+esc(s.duration||"?")+' min'+(s.feel?' · '+esc(s.feel):'')+(s.note?' — '+esc(s.note):'')+'</div>';
  return '<div>'+esc(s.text||"")+'</div>';
}
function bindHistory(){
  $("bw").oninput=function(){DATA.bodyweight=$("bw").value;persist();};
  $("main").querySelectorAll(".hsess").forEach(function(c){c.onclick=function(){c.querySelector(".det").classList.toggle("show");};});
  $("main").querySelectorAll("[data-act]").forEach(function(b){var a=b.getAttribute("data-act");
    if(a==="copyall")b.onclick=function(){doCopy(buildText(DATA.sessions),false);};
    if(a==="copynew")b.onclick=function(){var nw=DATA.sessions.filter(function(s){return s.id>(DATA.exportedUpto||0);});
      if(!nw.length){toast("Nothing new since last export");return;}
      doCopy(buildText(nw),true);};
    if(a==="backup")b.onclick=function(){var j=JSON.stringify(DATA);$("iobox").value=j;copyClip(j);};
    if(a==="restore")b.onclick=function(){
      var v=$("iobox").value.trim(); if(!v){toast("Paste a backup into the box first");return;}
      if(!confirm("Restore from backup? This replaces all current data."))return;
      try{var d=JSON.parse(v); if(!d||!Array.isArray(d.sessions))throw 0;
        DATA=Object.assign(fresh(),d);persist();toast("Restored ✓");render();}
      catch(e){toast("That doesn't look like a valid backup");}
    };
  });
}
function buildText(list){
  var L=["=== TRAINING LOG ==="];
  if(DATA.bodyweight)L.push("Bodyweight: "+DATA.bodyweight);
  L.push("Sessions: "+list.length+"  (exported "+new Date().toLocaleDateString()+")","");
  list.slice().forEach(function(s){
    if(s.type==="A"||s.type==="B"){
      L.push("["+s.date+"] Template "+s.type);
      s.items.forEach(function(it){
        if(it.key==="wu"&&!it.values.text&&!it.note&&!it.skipped)return;
        if(it.skipped){L.push("  - "+it.name+": SKIPPED"+(it.note?" ("+it.note+")":""));return;}
        var parts=[];for(var k in it.values){if(it.values[k]!=="")parts.push(it.values[k]);}
        if(!parts.length&&!it.note&&!(it.rir!=null&&it.rir!==""))return;
        var line="  - "+it.name+(it.swapped?" [swapped from "+it.base+"]":"")+": "+(parts.join(" / ")||"—");
        if(it.rir!=null&&it.rir!=="")line+=" (RIR "+it.rir+")";
        if(it.note)line+=" — note: "+it.note;
        L.push(line);
      });
    } else if(s.type==="extra"){
      var x="["+s.date+"] "+s.category; if(s.duration)x+=" "+s.duration+" min"; if(s.feel)x+=" — "+s.feel; if(s.text)x+=" — "+s.text; L.push(x);
    } else if(s.type==="aerobic"){
      L.push("["+s.date+"] Easy: "+s.modality+" "+(s.duration||"?")+" min"+(s.feel?" — "+s.feel:"")+(s.note?" — "+s.note:""));
    } else {
      L.push("["+s.date+"] Other ("+s.tag+"): "+s.text);
    }
    L.push("");
  });
  return L.join("\n");
}
function doCopy(text,markNew){
  $("iobox").value=text; copyClip(text);
  if(markNew){DATA.exportedUpto=Date.now();persist();}
}
function copyClip(text){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){toast("Copied ✓");},function(){selectBox();});
  } else selectBox();
}
function selectBox(){var b=$("iobox");b.focus();b.select();toast("Tap & hold the box → Copy");}

/* sheet / nav */
function openSheet(html){$("sheet").innerHTML=html;$("scrim").classList.add("show");}
function closeSheet(){$("scrim").classList.remove("show");}
$("scrim").onclick=function(e){if(e.target===$("scrim"))closeSheet();};
function syncNav(){document.querySelectorAll("nav button").forEach(function(b){b.classList.toggle("on",b.getAttribute("data-view")===(view==="B"?"A":view));});}
document.querySelectorAll("nav button").forEach(function(b){b.onclick=function(){
  var v=b.getAttribute("data-view");
  if(v==="A")view=draft.type; else view=v;
  syncNav();render();
};});

/* init */
$("sessDate").value=todayISO();
$("sessDate").onchange=function(){if(view==="A"||view==="B"){draft.date=$("sessDate").value;saveDraft();}};
view=draft.type; syncNav(); render();
</script>
</body>
